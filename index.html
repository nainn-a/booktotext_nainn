<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>booktotext — 이미지 텍스트 추출기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f8f6;
      --surface: #ffffff;
      --surface-2: #f3f2ef;
      --border: rgba(0,0,0,0.10);
      --border-md: rgba(0,0,0,0.18);
      --text: #1a1a18;
      --text-2: #5a5a56;
      --text-3: #9a9a96;
      --accent: #1a1a18;
      --danger-bg: #fff1f0;
      --danger-border: rgba(200,50,40,0.25);
      --danger-text: #b03030;
      --warn-bg: #fffbea;
      --warn-text: #8a6000;
      --radius: 10px;
      --radius-sm: 6px;
    }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }
    .logo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .logo span { color: var(--text-3); font-weight: 400; }
    .tagline { font-size: 13px; color: var(--text-3); margin-top: 4px; }

    /* Drop zone */
    #drop-zone {
      border: 1.5px dashed var(--border-md);
      border-radius: var(--radius);
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--surface);
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--surface-2);
    }
    #drop-zone.has-image {
      padding: 0;
      border-style: solid;
      border-color: var(--border);
      cursor: default;
    }
    #file-input { display: none; }
    #preview-img {
      width: 100%;
      max-height: 360px;
      object-fit: contain;
      border-radius: calc(var(--radius) - 1px);
      display: block;
    }

    .upload-icon {
      width: 44px; height: 44px;
      margin: 0 auto 14px;
      background: var(--surface-2);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
    }
    .upload-icon svg { width: 20px; height: 20px; stroke: var(--text-3); fill: none; }
    .upload-hint { font-size: 14px; color: var(--text-2); }
    .upload-hint strong { color: var(--text); font-weight: 500; }
    .upload-formats { font-size: 12px; color: var(--text-3); margin-top: 6px; }

    /* Controls */
    #controls { margin-top: 10px; display: flex; gap: 8px; }
    #extract-btn {
      flex: 1; padding: 11px 16px;
      font-size: 14px; font-weight: 500;
      background: var(--text); color: #fff;
      border: none; border-radius: var(--radius-sm);
      cursor: pointer; transition: opacity 0.15s;
      display: none;
      font-family: inherit;
    }
    #extract-btn:hover { opacity: 0.85; }
    #extract-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #reset-btn {
      padding: 11px 14px; font-size: 13px;
      background: transparent;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-sm);
      cursor: pointer; color: var(--text-2);
      display: none; transition: background 0.1s;
      font-family: inherit;
    }
    #reset-btn:hover { background: var(--surface-2); }

    /* Progress */
    #progress-wrap { margin-top: 12px; display: none; }
    #progress-bar {
      height: 2px; background: var(--surface-2);
      border-radius: 99px; overflow: hidden;
    }
    #progress-fill {
      height: 100%; background: var(--text);
      border-radius: 99px; width: 0%;
      transition: width 0.4s ease;
    }
    #status-msg { font-size: 12px; color: var(--text-3); margin-top: 6px; text-align: center; }

    /* Error */
    #error-box {
      margin-top: 10px; padding: 10px 14px; display: none;
      background: var(--danger-bg);
      border: 0.5px solid var(--danger-border);
      border-radius: var(--radius-sm);
      font-size: 13px; color: var(--danger-text);
    }

    /* Result */
    #result-section { margin-top: 1.5rem; display: none; }
    .result-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .result-label { font-size: 13px; font-weight: 500; color: var(--text-2); }
    #copy-btn {
      font-size: 12px; padding: 4px 10px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-sm);
      background: transparent; cursor: pointer;
      color: var(--text-2); transition: background 0.1s;
      font-family: inherit;
    }
    #copy-btn:hover { background: var(--surface-2); }
    #result-box {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
      font-size: 14px; line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 80px;
      font-family: 'Menlo', 'Consolas', monospace;
    }
    #char-count { font-size: 12px; color: var(--text-3); margin-top: 6px; text-align: right; }

    /* History */
    #history-section { margin-top: 2.5rem; }
    .section-title {
      font-size: 12px; font-weight: 500; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    #history-list { display: flex; flex-direction: column; gap: 6px; }
    #history-empty { font-size: 13px; color: var(--text-3); text-align: center; padding: 1.5rem; }

    .history-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .history-thumb {
      width: 44px; height: 44px;
      border-radius: 5px;
      object-fit: cover;
      flex-shrink: 0;
      border: 0.5px solid var(--border);
    }
    .thumb-expired {
      width: 44px; height: 44px;
      border-radius: 5px;
      background: var(--surface-2);
      border: 0.5px solid var(--border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb-expired svg { width: 16px; height: 16px; stroke: var(--text-3); fill: none; }
    .history-info { flex: 1; min-width: 0; }
    .history-name {
      font-size: 13px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-time { font-size: 12px; color: var(--text-3); margin-top: 2px; }
    .history-expire { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .expire-badge {
      display: inline-block; font-size: 10px; padding: 1px 7px;
      border-radius: 99px;
      background: var(--warn-bg); color: var(--warn-text);
      font-weight: 500;
    }
    .del-btn {
      font-size: 11px; padding: 3px 8px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent; cursor: pointer;
      color: var(--text-3); flex-shrink: 0;
      transition: color 0.1s, border-color 0.1s;
      font-family: inherit;
    }
    .del-btn:hover { color: var(--danger-text); border-color: var(--danger-border); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">booktotext <span>by nainn</span></div>
      <div class="tagline">사진 속 텍스트를 추출해요 — Claude Vision 기반</div>
    </header>

    <div id="drop-zone" onclick="onDropZoneClick(event)">
      <div id="upload-placeholder">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
          </svg>
        </div>
        <p class="upload-hint"><strong>클릭하거나 드래그</strong>해서 사진 업로드</p>
        <p class="upload-formats">JPG · PNG · WEBP · GIF · BMP</p>
      </div>
      <img id="preview-img" style="display:none;" alt="preview" />
    </div>
    <input type="file" id="file-input" accept="image/*" />

    <div id="controls">
      <button id="extract-btn" onclick="extractText()">텍스트 추출하기</button>
      <button id="reset-btn" onclick="resetUpload()">다시 선택</button>
    </div>

    <div id="progress-wrap">
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <p id="status-msg"></p>
    </div>
    <div id="error-box"></div>

    <div id="result-section">
      <div class="result-header">
        <span class="result-label">추출된 텍스트</span>
        <button id="copy-btn" onclick="copyText()">복사</button>
      </div>
      <div id="result-box"></div>
      <p id="char-count"></p>
    </div>

    <div id="history-section">
      <p class="section-title">업로드 기록</p>
      <div id="history-list">
        <p id="history-empty">아직 업로드된 사진이 없어요</p>
      </div>
    </div>
  </div>

  <script>
    const EXPIRE_MS = 24 * 60 * 60 * 1000;
    let uploads = [];
    let imageBase64 = null;
    let imageMediaType = null;

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const previewImg = document.getElementById('preview-img');
    const uploadPlaceholder = document.getElementById('upload-placeholder');
    const extractBtn = document.getElementById('extract-btn');
    const resetBtn = document.getElementById('reset-btn');
    const resultSection = document.getElementById('result-section');
    const resultBox = document.getElementById('result-box');
    const charCount = document.getElementById('char-count');
    const progressWrap = document.getElementById('progress-wrap');
    const progressFill = document.getElementById('progress-fill');
    const statusMsg = document.getElementById('status-msg');
    const errorBox = document.getElementById('error-box');
    const copyBtn = document.getElementById('copy-btn');

    function onDropZoneClick(e) {
      if (dropZone.classList.contains('has-image')) return;
      fileInput.click();
    }

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) { showError('이미지 파일만 업로드할 수 있어요.'); return; }
      hideError();
      const reader = new FileReader();
      reader.onload = ev => {
        const dataUrl = ev.target.result;
        imageBase64 = dataUrl.split(',')[1];
        imageMediaType = file.type;
        previewImg.src = dataUrl;
        previewImg.style.display = 'block';
        uploadPlaceholder.style.display = 'none';
        dropZone.classList.add('has-image');
        extractBtn.style.display = 'flex';
        resetBtn.style.display = 'flex';
        resultSection.style.display = 'none';

        const now = Date.now();
        const entry = { id: now, name: file.name, thumb: dataUrl, uploadedAt: now, expiresAt: now + EXPIRE_MS, expired: false, timer: null };
        entry.timer = setTimeout(() => expireEntry(entry.id), EXPIRE_MS);
        uploads.unshift(entry);
        renderHistory();
      };
      reader.readAsDataURL(file);
    }

    function expireEntry(id) {
      const u = uploads.find(u => u.id === id);
      if (!u) return;
      u.expired = true; u.thumb = null;
      renderHistory();
    }

    function deleteEntry(id) {
      const idx = uploads.findIndex(u => u.id === id);
      if (idx === -1) return;
      if (uploads[idx].timer) clearTimeout(uploads[idx].timer);
      uploads.splice(idx, 1);
      renderHistory();
    }

    function formatTime(ts) {
      const d = new Date(ts);
      const p = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
    }

    function formatExpire(expiresAt) {
      const diff = expiresAt - Date.now();
      if (diff <= 0) return '만료됨';
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      if (h > 0) return `${h}시간 ${m}분 후 자동 삭제`;
      return `${m}분 후 자동 삭제`;
    }

    function renderHistory() {
      const list = document.getElementById('history-list');
      if (uploads.length === 0) {
        list.innerHTML = '<p id="history-empty">아직 업로드된 사진이 없어요</p>';
        return;
      }
      list.innerHTML = uploads.map(u => `
        <div class="history-item">
          ${u.expired
            ? `<div class="thumb-expired"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>`
            : `<img class="history-thumb" src="${u.thumb}" alt="${u.name}" />`}
          <div class="history-info">
            <div class="history-name">${u.name}</div>
            <div class="history-time">${formatTime(u.uploadedAt)}</div>
            <div class="history-expire">
              ${u.expired
                ? '<span class="expire-badge">만료 — 사진 삭제됨</span>'
                : formatExpire(u.expiresAt)}
            </div>
          </div>
          <button class="del-btn" onclick="deleteEntry(${u.id})">삭제</button>
        </div>
      `).join('');
    }

    setInterval(() => {
      document.querySelectorAll('.history-expire').forEach((el, i) => {
        const u = uploads[i];
        if (u && !u.expired) el.textContent = formatExpire(u.expiresAt);
      });
    }, 30000);

    function resetUpload() {
      imageBase64 = null; imageMediaType = null;
      previewImg.src = ''; previewImg.style.display = 'none';
      uploadPlaceholder.style.display = 'block';
      dropZone.classList.remove('has-image');
      extractBtn.style.display = 'none'; resetBtn.style.display = 'none';
      resultSection.style.display = 'none';
      progressWrap.style.display = 'none'; statusMsg.textContent = '';
      fileInput.value = ''; hideError();
    }

    async function extractText() {
      if (!imageBase64) return;
      extractBtn.disabled = true; extractBtn.textContent = '분석 중...';
      resultSection.style.display = 'none';
      progressWrap.style.display = 'block'; progressFill.style.width = '30%';
      statusMsg.textContent = '이미지를 분석하고 있어요...'; hideError();
      try {
        progressFill.style.width = '60%';
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{ role: 'user', content: [
              { type: 'image', source: { type: 'base64', media_type: imageMediaType, data: imageBase64 } },
              { type: 'text', text: '이 이미지에 있는 모든 텍스트를 정확하게 추출해줘. 이미지에 보이는 텍스트만 그대로 출력하고, 다른 설명이나 부연은 전혀 붙이지 마. 텍스트가 없으면 "[텍스트 없음]"이라고만 출력해.' }
            ]}]
          })
        });
        progressFill.style.width = '90%';
        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error?.message || `API 오류 (${response.status})`);
        }
        const data = await response.json();
        const text = data.content?.map(b => b.text || '').join('') || '';
        progressFill.style.width = '100%'; statusMsg.textContent = '';
        setTimeout(() => {
          progressWrap.style.display = 'none'; progressFill.style.width = '0%';
          resultBox.textContent = text;
          charCount.textContent = `${text.replace(/\s/g,'').length}자 (공백 제외)`;
          resultSection.style.display = 'block';
          extractBtn.disabled = false; extractBtn.textContent = '다시 추출';
        }, 300);
      } catch (err) {
        progressWrap.style.display = 'none'; progressFill.style.width = '0%';
        statusMsg.textContent = '';
        showError('추출 실패: ' + err.message);
        extractBtn.disabled = false; extractBtn.textContent = '텍스트 추출하기';
      }
    }

    function copyText() {
      const text = resultBox.textContent;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = '복사됨';
        setTimeout(() => copyBtn.textContent = '복사', 1500);
      }).catch(() => {
        const sel = window.getSelection(); const range = document.createRange();
        range.selectNodeContents(resultBox); sel.removeAllRanges(); sel.addRange(range);
        document.execCommand('copy');
        copyBtn.textContent = '복사됨'; setTimeout(() => copyBtn.textContent = '복사', 1500);
      });
    }

    function showError(msg) { errorBox.textContent = msg; errorBox.style.display = 'block'; }
    function hideError() { errorBox.style.display = 'none'; }
  </script>
</body>
</html>
