<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>booktotext — 이미지 텍스트 추출기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #FAF8F3;
      --bg-2:      #F2EEE6;
      --surface:   #EDE9DF;
      --hist-bg:   rgba(208,200,182,0.82);
      --border:    rgba(42,32,22,0.10);
      --border-md: rgba(42,32,22,0.20);
      --border-hi: rgba(42,32,22,0.40);
      --text:      #2A2016;
      --text-3:    #7A6E58;
      --thumb:     #8A7E68;
      --btn-bg:    #2A2016;
      --btn-text:  #F2EEE4;
      --danger-bg: rgba(160,48,32,0.08);
      --danger-bd: rgba(160,48,32,0.22);
      --danger-tx: #903020;
      --expire-bg: rgba(122,110,88,0.15);
      --expire-tx: #7A6E58;
      --fs: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --ff: Georgia, 'Times New Roman', serif;
      --r:  10px; --rs: 4px;
    }
    body { font-family: var(--fs); background-color: var(--bg); background-image: radial-gradient(circle, #CCC4B0 1px, transparent 1px); background-size: 18px 18px; color: var(--text); min-height: 100vh; padding: 2.5rem 1rem 5rem; }
    .wrap { max-width: 640px; margin: 0 auto; }
    header { margin-bottom: 1.5rem; }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: 0.04em; color: var(--text); font-family: var(--ff); }
    .logo-sub { font-weight: 400; font-family: var(--fs); font-size: 13px; color: var(--text-3); letter-spacing: 0; }
    .tagline { font-size: 12px; color: var(--text-3); margin-top: 4px; }
    #sync-status { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-3); margin-top: 5px; }
    #sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #B0A890; flex-shrink: 0; transition: background 0.3s; }
    #sync-dot.ok { background: #7A9A6A; } #sync-dot.err { background: #903020; }

    /* 로그인 */
    #login-screen { margin-top: 3rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    #login-screen p { font-size: 13px; color: var(--text-3); }
    #google-login-btn { display: inline-flex; align-items: center; gap: 10px; padding: 10px 20px; font-size: 13px; font-weight: 500; border: 1px solid var(--border-md); border-radius: var(--rs); background: var(--surface); cursor: pointer; color: var(--text); font-family: var(--fs); transition: background 0.1s; }
    #google-login-btn:hover { background: var(--bg-2); }
    #google-login-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* 유저 바 */
    #user-bar { display: none; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; padding: 8px 12px; background: rgba(240,235,224,0.88); border: 1px solid var(--border); border-radius: var(--rs); }
    #user-bar.visible { display: flex; }
    .user-info { display: flex; align-items: center; gap: 8px; }
    .user-avatar { width: 24px; height: 24px; border-radius: 50%; }
    .user-name { font-size: 12px; color: var(--text-3); }
    #logout-btn { font-size: 11px; padding: 3px 9px; border: 1px solid var(--border-md); border-radius: var(--rs); background: transparent; cursor: pointer; color: var(--text-3); font-family: var(--fs); }
    #logout-btn:hover { background: var(--bg-2); }

    #app-screen { display: none; }
    #app-screen.visible { display: block; }

    /* 드롭존 */
    #drop-zone { border: 1.5px dashed rgba(42,32,22,0.28); border-radius: var(--r); padding: 2rem 1.5rem; text-align: center; cursor: pointer; background: rgba(240,235,224,0.88); transition: border-color 0.15s, background 0.15s; }
    #drop-zone:hover, #drop-zone.over { border-color: var(--border-hi); background: rgba(232,226,212,0.95); }
    #file-input { display: none; }
    .up-icon { width: 42px; height: 42px; margin: 0 auto 14px; background: rgba(42,32,22,0.10); border: 1px solid rgba(42,32,22,0.18); border-radius: var(--rs); display: flex; align-items: center; justify-content: center; }
    .up-icon svg { width: 18px; height: 18px; stroke: var(--text); fill: none; }
    .up-hint { font-size: 14px; color: var(--text); font-family: var(--ff); }
    .up-hint strong { font-weight: 700; }
    .up-fmt { font-size: 11px; color: var(--text-3); margin-top: 6px; letter-spacing: 0.06em; }

    /* 큐 */
    #queue-section { margin-top: 12px; display: none; flex-direction: column; gap: 8px; }
    .queue-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: rgba(240,235,224,0.88); border: 1px solid var(--border); border-radius: var(--rs); }
    .queue-thumb { width: 40px; height: 40px; border-radius: 3px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); }
    .queue-info { flex: 1; min-width: 0; }
    .queue-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .queue-status { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .queue-status.done { color: #7A9A6A; }
    .queue-status.error { color: var(--danger-tx); }
    .queue-status.processing { color: var(--text-3); }
    .queue-remove { font-size: 11px; padding: 2px 7px; border: 1px solid var(--border); border-radius: var(--rs); background: transparent; cursor: pointer; color: var(--text-3); font-family: var(--fs); flex-shrink: 0; }
    .queue-remove:hover { color: var(--danger-tx); border-color: var(--danger-bd); }

    #controls { margin-top: 10px; display: flex; gap: 8px; }
    #extract-btn { flex: 1; padding: 11px 16px; font-size: 13px; font-weight: 700; background: var(--btn-bg); color: var(--btn-text); border: none; border-radius: var(--rs); cursor: pointer; display: none; font-family: var(--ff); letter-spacing: 0.06em; text-transform: uppercase; text-align: center; transition: opacity 0.15s; }
    #extract-btn:hover { opacity: 0.85; }
    #extract-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #reset-btn { padding: 11px 14px; font-size: 12px; background: transparent; border: 1px solid var(--border-md); border-radius: var(--rs); cursor: pointer; color: var(--text-3); display: none; font-family: var(--fs); transition: background 0.1s; }
    #reset-btn:hover { background: var(--bg-2); }

    #prog-wrap { margin-top: 12px; display: none; }
    #prog-bar { height: 2px; background: rgba(42,32,22,0.12); border-radius: 99px; overflow: hidden; }
    #prog-fill { height: 100%; background: var(--btn-bg); border-radius: 99px; width: 0%; transition: width 0.3s ease; }
    #status-msg { font-size: 11px; color: var(--text-3); margin-top: 6px; text-align: center; }
    #error-box { margin-top: 10px; padding: 10px 14px; display: none; background: var(--danger-bg); border: 1px solid var(--danger-bd); border-radius: var(--rs); font-size: 13px; color: var(--danger-tx); }

    /* 결과 */
    #result-sec { margin-top: 1.5rem; display: none; }
    .res-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .res-lbl { font-size: 10px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; }
    #copy-btn { font-size: 11px; padding: 4px 10px; border: 1px solid var(--border-md); border-radius: var(--rs); background: transparent; cursor: pointer; color: var(--text-3); font-family: var(--fs); transition: background 0.1s; }
    #copy-btn:hover { background: var(--bg-2); }
    #result-box { background: rgba(240,235,224,0.88); border: 1px solid var(--border); border-radius: var(--rs); padding: 1rem 1.25rem; font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-wrap; word-break: break-word; min-height: 80px; font-family: var(--fs); }
    #char-count { font-size: 10px; color: var(--text-3); margin-top: 6px; text-align: right; }

    .divider { height: 1px; background: rgba(42,32,22,0.12); margin: 2rem 0; }
    .sec-title { font-size: 10px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    #hist-list { display: flex; flex-direction: column; gap: 6px; }
    #hist-empty { font-size: 13px; color: var(--text-3); text-align: center; padding: 1.5rem; border: 1px dashed var(--border-md); border-radius: var(--rs); }
    .hi { display: flex; flex-direction: column; padding: 10px 14px; background: var(--hist-bg); border: 1px solid var(--border); border-radius: var(--rs); }
    .hi-top { display: flex; align-items: center; gap: 12px; }
    .hi-thumb { width: 44px; height: 44px; border-radius: 3px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); }
    .hi-exp-thumb { width: 44px; height: 44px; border-radius: 3px; background: var(--thumb); border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .hi-exp-thumb svg { width: 16px; height: 16px; stroke: var(--bg); fill: none; }
    .hi-info { flex: 1; min-width: 0; }
    .hi-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hi-time { font-size: 11px; color: var(--text-3); margin-top: 2px; font-variant-numeric: tabular-nums; }
    .hi-expire { font-size: 10px; color: var(--text-3); margin-top: 2px; }
    .exp-badge { display: inline-block; font-size: 9px; padding: 1px 7px; border-radius: 99px; background: var(--expire-bg); color: var(--expire-tx); font-weight: 500; }
    .hi-btns { display: flex; gap: 5px; flex-shrink: 0; }
    .text-toggle-btn { font-size: 11px; padding: 3px 8px; border: 1px solid var(--border-md); border-radius: var(--rs); background: transparent; cursor: pointer; color: var(--text-3); font-family: var(--fs); white-space: nowrap; transition: background 0.1s; }
    .text-toggle-btn:hover { background: var(--bg-2); }
    .del-btn { font-size: 11px; padding: 3px 8px; border: 1px solid var(--border); border-radius: var(--rs); background: transparent; cursor: pointer; color: var(--text-3); font-family: var(--fs); transition: color 0.1s, border-color 0.1s; }
    .del-btn:hover { color: var(--danger-tx); border-color: var(--danger-bd); }
    .hi-text { margin-top: 8px; padding: 8px 10px; background: rgba(240,235,224,0.7); border: 1px solid var(--border); border-radius: var(--rs); font-size: 12px; line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: break-word; font-family: var(--fs); }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />
  <style>
    /* 크롭 모달 */
    #crop-modal {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(42,32,22,0.7);
      align-items: center; justify-content: center;
    }
    #crop-modal.open { display: flex; }
    .crop-box {
      background: var(--bg); border-radius: var(--r);
      padding: 16px; width: min(90vw, 560px);
      display: flex; flex-direction: column; gap: 12px;
    }
    .crop-header { display: flex; align-items: center; justify-content: space-between; }
    .crop-title { font-size: 13px; font-weight: 500; color: var(--text); font-family: var(--ff); }
    .crop-hint { font-size: 11px; color: var(--text-3); }
    .crop-img-wrap { width: 100%; max-height: 55vh; overflow: hidden; background: #1a1a1a; border-radius: var(--rs); }
    #crop-img { display: block; max-width: 100%; }
    .crop-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .crop-btn-confirm { padding: 9px 18px; font-size: 13px; font-weight: 700; background: var(--btn-bg); color: var(--btn-text); border: none; border-radius: var(--rs); cursor: pointer; font-family: var(--ff); letter-spacing: 0.04em; transition: opacity 0.15s; }
    .crop-btn-confirm:hover { opacity: 0.85; }
    .crop-btn-skip { padding: 9px 14px; font-size: 12px; background: transparent; border: 1px solid var(--border-md); border-radius: var(--rs); cursor: pointer; color: var(--text-3); font-family: var(--fs); transition: background 0.1s; }
    .crop-btn-skip:hover { background: var(--bg-2); }
    .crop-btn-cancel { padding: 9px 14px; font-size: 12px; background: transparent; border: 1px solid var(--border-md); border-radius: var(--rs); cursor: pointer; color: var(--text-3); font-family: var(--fs); transition: background 0.1s; }
    .crop-btn-cancel:hover { background: var(--bg-2); }
  </style>
</head>
<body>
<!-- 크롭 모달 -->
<div id="crop-modal">
  <div class="crop-box">
    <div class="crop-header">
      <span class="crop-title">크롭</span>
      <span class="crop-hint" id="crop-hint"></span>
    </div>
    <div class="crop-img-wrap"><img id="crop-img" alt="crop" /></div>
    <div class="crop-btns">
      <button class="crop-btn-cancel" id="crop-cancel">취소</button>
      <button class="crop-btn-skip" id="crop-skip">크롭 안 함</button>
      <button class="crop-btn-confirm" id="crop-confirm">크롭 적용</button>
    </div>
  </div>
</div>

<div class="wrap">
  <header>
    <div class="logo">booktotext <span class="logo-sub">by nainn</span></div>
    <div class="tagline">사진 속 텍스트를 추출해요 — Claude Vision 기반</div>
    <div id="sync-status"><span id="sync-dot"></span><span id="sync-label">연결 중...</span></div>
  </header>

  <div id="login-screen">
    <p>Google 계정으로 로그인하면 모든 기기에서 기록이 동기화돼요</p>
    <button id="google-login-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google로 로그인
    </button>
  </div>

  <div id="user-bar">
    <div class="user-info">
      <img class="user-avatar" id="user-avatar" src="" alt="" />
      <span class="user-name" id="user-name"></span>
    </div>
    <button id="logout-btn">로그아웃</button>
  </div>

  <div id="app-screen">
    <div id="drop-zone">
      <div class="up-icon">
        <svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
      </div>
      <p class="up-hint"><strong>클릭하거나 드래그</strong>해서 사진 업로드</p>
      <p class="up-fmt">최대 10장 · JPG · PNG · WEBP · BMP</p>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple />

    <div id="queue-section"></div>

    <div id="controls">
      <button id="extract-btn">텍스트 추출하기</button>
      <button id="reset-btn">다시 선택</button>
    </div>

    <div id="prog-wrap"><div id="prog-bar"><div id="prog-fill"></div></div><p id="status-msg"></p></div>
    <div id="error-box"></div>

    <div id="result-sec">
      <div class="res-hd"><span class="res-lbl">추출된 텍스트</span><button id="copy-btn">복사</button></div>
      <div id="result-box"></div>
      <p id="char-count"></p>
    </div>

    <div class="divider"></div>
    <p class="sec-title">업로드 기록</p>
    <div id="hist-list"><p id="hist-empty">아직 업로드된 사진이 없어요</p></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc,
  onSnapshot, query, orderBy, getDocs }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = await fetch('/api/firebase-config').then(r => r.json());
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const EXPIRE_MS = 30 * 24 * 60 * 60 * 1000;
const MAX_FILES = 10;

/* 큐: [{file, url, b64, docId, status}] */
let queue = [];
let uploadsCol = null, unsubscribe = null;

/* DOM */
const loginScreen = document.getElementById('login-screen');
const userBar     = document.getElementById('user-bar');
const appScreen   = document.getElementById('app-screen');
const userAvatar  = document.getElementById('user-avatar');
const userName    = document.getElementById('user-name');
const logoutBtn   = document.getElementById('logout-btn');
const googleBtn   = document.getElementById('google-login-btn');
const dz          = document.getElementById('drop-zone');
const fi          = document.getElementById('file-input');
const queueSec    = document.getElementById('queue-section');
const xBtn        = document.getElementById('extract-btn');
const rBtn        = document.getElementById('reset-btn');
const resSec      = document.getElementById('result-sec');
const resBox      = document.getElementById('result-box');
const charCount   = document.getElementById('char-count');
const progWrap    = document.getElementById('prog-wrap');
const progFill    = document.getElementById('prog-fill');
const statusMsg   = document.getElementById('status-msg');
const errBox      = document.getElementById('error-box');
const copyBtn     = document.getElementById('copy-btn');
const syncDot     = document.getElementById('sync-dot');
const syncLabel   = document.getElementById('sync-label');

function setSyncStatus(s) {
  syncDot.className = s;
  syncLabel.textContent = s === 'ok' ? '동기화됨' : s === 'err' ? '연결 오류' : '동기화 중...';
}

/* 인증 */
onAuthStateChanged(auth, user => {
  if (user) {
    loginScreen.style.display = 'none';
    userBar.classList.add('visible');
    appScreen.classList.add('visible');
    userAvatar.src = user.photoURL || '';
    userName.textContent = user.displayName || user.email;
    uploadsCol = collection(db, 'users', user.uid, 'uploads');
    startListening();
    setSyncStatus('ok');
  } else {
    loginScreen.style.display = 'flex';
    userBar.classList.remove('visible');
    appScreen.classList.remove('visible');
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    setSyncStatus('err');
    syncLabel.textContent = '로그인 필요';
  }
});

googleBtn.addEventListener('click', () => signInWithPopup(auth, new GoogleAuthProvider()).catch(console.error));
logoutBtn.addEventListener('click', () => signOut(auth));

function startListening() {
  if (unsubscribe) unsubscribe();
  const q = query(uploadsCol, orderBy('uploadedAt', 'desc'));
  unsubscribe = onSnapshot(q,
    snap => { setSyncStatus('ok'); renderHistory(snap.docs.map(d => ({ id: d.id, ...d.data() }))); },
    () => setSyncStatus('err')
  );
}

/* 드롭존 */
dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  handleFiles(Array.from(e.dataTransfer.files));
});
fi.addEventListener('change', e => handleFiles(Array.from(e.target.files)));

/* 썸네일 리사이즈 */
function resizeThumb(url, maxSize = 120) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.src = url;
  });
}

/* ── 크롭 모달 ── */
const cropModal   = document.getElementById('crop-modal');
const cropImg     = document.getElementById('crop-img');
const cropConfirm = document.getElementById('crop-confirm');
const cropSkip    = document.getElementById('crop-skip');
const cropCancel  = document.getElementById('crop-cancel');
const cropHint    = document.getElementById('crop-hint');
let cropper = null;

function openCropper(url, hint) {
  return new Promise(resolve => {
    cropImg.src = url;
    cropHint.textContent = hint;
    cropModal.classList.add('open');
    if (cropper) { cropper.destroy(); cropper = null; }
    cropImg.onload = () => {
      cropper = new Cropper(cropImg, {
        viewMode: 1,
        dragMode: 'move',
        autoCropArea: 0.95,
        movable: true,
        zoomable: true,
        cropBoxMovable: false,
        cropBoxResizable: true,
        toggleDragModeOnDblclick: false,
      });
    };
    cropConfirm.onclick = () => {
      const canvas = cropper.getCroppedCanvas({ maxWidth: 2400, maxHeight: 2400 });
      cropModal.classList.remove('open');
      if (cropper) { cropper.destroy(); cropper = null; }
      resolve({ cropped: true, url: canvas.toDataURL('image/jpeg', 0.92) });
    };
    cropSkip.onclick = () => {
      cropModal.classList.remove('open');
      if (cropper) { cropper.destroy(); cropper = null; }
      resolve({ cropped: false, url });
    };
    cropCancel.onclick = () => {
      cropModal.classList.remove('open');
      if (cropper) { cropper.destroy(); cropper = null; }
      resolve(null);
    };
  });
}

/* 파일 처리 */
async function handleFiles(files) {
  const imgFiles = files.filter(f => f.type.startsWith('image/')).slice(0, MAX_FILES - queue.length);
  if (!imgFiles.length) return;
  hideErr();

  for (let i = 0; i < imgFiles.length; i++) {
    const file = imgFiles[i];
    const origUrl = await new Promise(res => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.readAsDataURL(file);
    });

    const hint = imgFiles.length > 1 ? `${queue.length + 1} / ${queue.length + imgFiles.length}` : '';
    const result = await openCropper(origUrl, hint);
    if (!result) break; // 취소하면 나머지도 중단

    const finalUrl = result.url;
    const b64 = finalUrl.split(',')[1];
    const now = Date.now() + queue.length;
    const docId = String(now);
    const thumb = await resizeThumb(finalUrl);

    queue.push({ file, url: finalUrl, b64, mime: 'image/jpeg', docId, status: 'ready', thumb });

    setSyncStatus('ing');
    setDoc(doc(uploadsCol, docId), {
      name: file.name, thumb,
      uploadedAt: now, expiresAt: now + EXPIRE_MS,
      extractedText: ''
    }).then(() => setSyncStatus('ok')).catch(() => setSyncStatus('err'));
  }

  if (!queue.length) return;
  renderQueue();
  xBtn.style.display = 'block';
  rBtn.style.display = 'block';
  queueSec.style.display = 'flex';
  resSec.style.display = 'none';

  if (queue.length >= MAX_FILES) {
    dz.style.opacity = '0.4';
    dz.style.pointerEvents = 'none';
  }
}

/* 큐 렌더 */
function renderQueue() {
  queueSec.innerHTML = queue.map((item, i) => `
    <div class="queue-item" id="qi-${i}">
      <img class="queue-thumb" src="${item.thumb}" alt="${esc(item.file.name)}" />
      <div class="queue-info">
        <div class="queue-name">${esc(item.file.name)}</div>
        <div class="queue-status ${item.status}" id="qs-${i}">
          ${item.status === 'ready' ? '대기 중' : item.status === 'processing' ? '추출 중...' : item.status === 'done' ? '완료' : '오류'}
        </div>
      </div>
      ${item.status === 'ready' ? `<button class="queue-remove" onclick="removeFromQueue(${i})">✕</button>` : ''}
    </div>
  `).join('');
}

window.removeFromQueue = i => {
  queue.splice(i, 1);
  if (!queue.length) resetAll();
  else { renderQueue(); }
  if (queue.length < MAX_FILES) { dz.style.opacity = ''; dz.style.pointerEvents = ''; }
};

/* OCR 추출 — 순차 처리 */
xBtn.addEventListener('click', async () => {
  if (!queue.length) return;
  xBtn.disabled = true; xBtn.textContent = '추출 중...';
  resSec.style.display = 'none';
  progWrap.style.display = 'block';
  hideErr();

  const results = [];
  for (let i = 0; i < queue.length; i++) {
    const item = queue[i];
    if (item.status === 'done') { results.push(item.result || ''); continue; }
    item.status = 'processing';
    renderQueue();
    const pct = Math.round((i / queue.length) * 80) + 10;
    progFill.style.width = pct + '%';
    statusMsg.textContent = `${i + 1} / ${queue.length} 처리 중...`;

    try {
      const res = await fetch('/api/ocr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 2000,
          messages: [{ role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: item.mime, data: item.b64 } },
            { type: 'text', text: `이 이미지에서 텍스트를 추출한다. 아래 규칙을 절대적으로 따른다.

규칙:
1. 이미지에 실제로 인쇄되거나 쓰여 있는 글자만 그대로 출력한다.
2. 단어나 문장을 절대 바꾸지 않는다. 맞춤법 교정, 문맥 보완, 추측, 의역을 일절 하지 않는다.
3. 판독하기 어려운 글자는 [?]로 표시한다. 억지로 읽지 않는다.
4. 이미지에 없는 글자를 만들어내지 않는다.
5. 설명, 요약, 부연 없이 텍스트만 출력한다.
6. 텍스트가 없으면 [텍스트 없음]만 출력한다.` }
          ]}]
        })
      });
      if (!res.ok) throw new Error(`API 오류 (${res.status})`);
      const data = await res.json();
      const text = data.content?.map(b => b.text || '').join('') || '';
      item.status = 'done';
      item.result = text;
      results.push(text);
      if (item.docId) {
        updateDoc(doc(uploadsCol, item.docId), { extractedText: text }).catch(() => {});
      }
    } catch(e) {
      item.status = 'error';
      results.push(`[오류: ${e.message}]`);
    }
    renderQueue();
  }

  progFill.style.width = '100%';
  statusMsg.textContent = '';
  setTimeout(() => {
    progWrap.style.display = 'none';
    progFill.style.width = '0%';

    const combined = results.join('\n\n───────────────\n\n');
    resBox.textContent = combined;
    charCount.textContent = `${combined.replace(/\s/g, '').length}자 (공백 제외)`;
    resSec.style.display = 'block';
    xBtn.disabled = false;
    xBtn.textContent = queue.length > 1 ? '다시 추출' : '다시 추출';
  }, 300);
});

/* 리셋 */
rBtn.addEventListener('click', resetAll);
function resetAll() {
  queue = [];
  queueSec.innerHTML = ''; queueSec.style.display = 'none';
  dz.style.opacity = ''; dz.style.pointerEvents = '';
  xBtn.style.display = 'none'; rBtn.style.display = 'none';
  resSec.style.display = 'none';
  progWrap.style.display = 'none'; statusMsg.textContent = '';
  fi.value = ''; hideErr();
}

/* 복사 */
copyBtn.addEventListener('click', () => {
  const text = resBox.textContent; if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    copyBtn.textContent = '복사됨'; setTimeout(() => copyBtn.textContent = '복사', 1500);
  }).catch(() => {
    const s = window.getSelection(), r = document.createRange();
    r.selectNodeContents(resBox); s.removeAllRanges(); s.addRange(r);
    document.execCommand('copy');
    copyBtn.textContent = '복사됨'; setTimeout(() => copyBtn.textContent = '복사', 1500);
  });
});

/* 삭제 */
window.deleteEntry = async id => {
  setSyncStatus('ing');
  try { await deleteDoc(doc(uploadsCol, String(id))); setSyncStatus('ok'); }
  catch { setSyncStatus('err'); }
};

/* 텍스트 토글 */
window.toggleText = (id, btn) => {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.style.display === 'none';
  el.style.display = open ? 'block' : 'none';
  btn.textContent = open ? '텍스트 ▲' : '텍스트 ▼';
};

/* 렌더링 */
function fmt(ts) {
  const d = new Date(ts), p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
function fmtExp(exp) {
  const diff = exp - Date.now(); if (diff <= 0) return '만료됨';
  const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000);
  if (d > 0) return `${d}일 ${h}시간 후 자동 삭제`;
  const m = Math.floor((diff%3600000)/60000);
  return h > 0 ? `${h}시간 ${m}분 후 자동 삭제` : `${m}분 후 자동 삭제`;
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderHistory(uploads) {
  const list = document.getElementById('hist-list');
  const now = Date.now();
  if (!uploads.length) { list.innerHTML = '<p id="hist-empty">아직 업로드된 사진이 없어요</p>'; return; }
  list.innerHTML = uploads.map(u => {
    const expired = u.expiresAt < now;
    const hasText = u.extractedText && u.extractedText.trim().length > 0;
    return `<div class="hi">
      <div class="hi-top">
        ${expired || !u.thumb
          ? `<div class="hi-exp-thumb"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>`
          : `<img class="hi-thumb" src="${u.thumb}" alt="${esc(u.name)}" />`}
        <div class="hi-info">
          <div class="hi-name">${esc(u.name)}</div>
          <div class="hi-time">${fmt(u.uploadedAt)}</div>
          <div class="hi-expire">${expired ? '<span class="exp-badge">만료 — 사진 삭제됨</span>' : fmtExp(u.expiresAt)}</div>
        </div>
        <div class="hi-btns">
          ${hasText ? `<button class="text-toggle-btn" onclick="toggleText('txt-${u.id}', this)">텍스트 ▼</button>` : ''}
          <button class="del-btn" onclick="deleteEntry('${u.id}')">삭제</button>
        </div>
      </div>
      ${hasText ? `<div id="txt-${u.id}" class="hi-text" style="display:none;">${esc(u.extractedText)}</div>` : ''}
    </div>`;
  }).join('');
}

/* 만료 정리 */
setInterval(async () => {
  if (!uploadsCol) return;
  const now = Date.now();
  const snap = await getDocs(uploadsCol);
  snap.forEach(d => { if (d.data().expiresAt < now) deleteDoc(doc(uploadsCol, d.id)); });
}, 3600000);

function showErr(msg) { errBox.textContent = msg; errBox.style.display = 'block'; }
function hideErr() { errBox.style.display = 'none'; }
</script>
